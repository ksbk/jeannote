name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Lint, type-check, test
    runs-on: ubuntu-latest

    env:
      # Required by base.py — value is irrelevant for tests
      SECRET_KEY: ci-only-not-a-real-secret  # trunk-ignore(trufflehog)
      # dev settings: DEBUG=True, SQLite, console email — no extra env needed
      DJANGO_SETTINGS_MODULE: config.settings.dev

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Ruff
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy .

      - name: Pytest (with coverage)
        run: uv run pytest --cov --cov-report=term-missing

      - name: Install Playwright browser
        run: uv run playwright install --with-deps chromium

      - name: Pytest e2e (Chromium)
        run: uv run pytest tests/e2e --override-ini="addopts=-v --tb=short" -m e2e --browser chromium

      - name: Django system check
        run: uv run python manage.py check

      - name: Django migration drift check
        run: uv run python manage.py makemigrations --check --dry-run

      - name: Django deploy check
        run: make check-deploy

      - name: Check requirements.txt is in sync
        run: make check-reqs

  # ---------------------------------------------------------------------------
  # Post-deploy smoke check
  # Runs only when DEPLOY_URL is set as a repository secret.
  # Set DEPLOY_URL (e.g. https://your-demo.up.railway.app) in:
  #   GitHub → Settings → Secrets and variables → Actions → Repository secrets
  # Skipped automatically on all other runs — no action needed to disable it.
  # ---------------------------------------------------------------------------
  smoke:
    name: Post-deploy smoke check
    runs-on: ubuntu-latest
    needs: test
    # Only run on push to main; the smoke step itself is skipped when DEPLOY_URL is not set.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      DEPLOY_URL: ${{ secrets.DEPLOY_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run smoke check against production
        if: env.DEPLOY_URL != ''
        run: python scripts/smoke_check.py --base-url "$DEPLOY_URL"
