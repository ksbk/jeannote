name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Lint, type-check, test
    runs-on: ubuntu-latest

    env:
      # Required by base.py — value is irrelevant for tests
      # VS Code Trunk extension flags this as a high-entropy string; it is not.
      SECRET_KEY: ci-only-not-a-real-secret  # trunk-ignore(checkov/CKV_SECRET_6)
      # dev settings: DEBUG=True, SQLite, console email — no extra env needed
      DJANGO_SETTINGS_MODULE: config.settings.dev

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Ruff
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy .

      - name: Pytest (with coverage)
        run: uv run pytest --cov --cov-report=term-missing

      - name: Install Playwright browser
        run: uv run playwright install --with-deps chromium

      - name: Pytest e2e (Chromium)
        run: uv run pytest tests/e2e --override-ini="addopts=-v --tb=short" -m e2e --browser chromium

      - name: Django system check
        run: uv run python manage.py check

      - name: Django migration drift check
        run: uv run python manage.py makemigrations --check --dry-run

      - name: Django deploy check
        run: make check-deploy

      - name: Check requirements.txt is in sync
        run: make check-reqs
